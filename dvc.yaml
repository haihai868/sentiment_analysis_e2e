stages:
  ingest:
    cmd: python src/data_pipeline/ingest.py
    deps:
      - src/data_pipeline/ingest.py
    outs:
      - data/raw/Twitter_Data.csv

  preprocess:
    cmd: python src/data_pipeline/preprocess.py
    deps:
      - src/data_pipeline/preprocess.py
      - data/raw/Twitter_Data.csv
    outs:
      - data/processed/processed_twitter_data.csv

  train:
    cmd: python src/models/train.py
    deps:
      - src/models/train.py
      - src/models/onnx_export.py
      - src/models/model_registry.py
      - data/processed/processed_twitter_data.csv
      - params.yaml
    params:
      - model
      - training
      - gates
    outs:
      - artifacts/onnx_model.onnx
      - artifacts/model_info.json
      - artifacts/reference_stats.json
    metrics:
      - artifacts/metrics.json

  drift_monitor:
    cmd: python src/monitoring/drift.py
    deps:
      - src/monitoring/drift.py
      - artifacts/reference_stats.json
    outs:
      - artifacts/monitoring/drift_report.json

  retrain_signal:
    cmd: python src/monitoring/retrain.py
    deps:
      - src/monitoring/retrain.py
      - artifacts/monitoring/drift_report.json
    outs:
      - artifacts/monitoring/retrain_signal.json
