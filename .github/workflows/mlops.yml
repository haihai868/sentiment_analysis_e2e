name: MLOps Pipeline

on:
  workflow_dispatch:    # only run when one manually triggers
#   push:
#     branches: [main]

jobs:
  train-and-register:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # - name: pipeline
